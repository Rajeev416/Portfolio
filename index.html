<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajeev Kumar | Portfolio</title>
    <meta name="description"
        content="Portfolio of Rajeev Kumar - Problem Solver, MERN Stack Developer, and DSA Enthusiast.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F59E0B',
                        secondary: '#F97316',
                        dark: '#080c12',
                        card: 'rgba(12, 18, 24, 0.45)',
                        'accent-blue': '#38BDF8',
                        'accent-emerald': '#34D399',
                        'accent-amber': '#FBBF24',
                        'accent-cyan': '#22D3EE',
                        'accent-rose': '#FB7185',
                        'accent-indigo': '#818CF8',
                        'text-main': '#e2e8f0',
                        'text-muted': '#94a3b8',
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Font Awesome (for Brands) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-text-main font-['Inter'] selection:bg-primary/30 selection:text-primary overflow-x-hidden">

    <!-- ═══ Liquid Glass Background ═══ -->
    <div class="liquid-glass-bg">
        <div class="glass-orb glass-orb-1"></div>
        <div class="glass-orb glass-orb-2"></div>
        <div class="glass-orb glass-orb-3"></div>
        <div class="glass-orb glass-orb-4"></div>
    </div>
    <div class="grain-overlay"></div>

    <!-- ═══ Floating Navbar — Liquid Glass Pill ═══ -->
    <nav id="main-nav" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-300">
        <div id="nav-container"
            class="nav-glass flex items-center gap-1 p-1.5 rounded-full transition-all duration-300 relative">
            
            <!-- Mobile Toggle Button -->
            <button id="nav-toggle" aria-label="Toggle Menu"
                class="hidden p-2 text-primary transition-all duration-300 rounded-full hover:bg-white/5 active:scale-95">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>

            <!-- Navigation Links -->
            <div id="nav-links" class="flex items-center gap-1 transition-all duration-300">
                <a href="#home" class="nav-link active" aria-label="Home">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span class="nav-label">Home</span>
                </a>
                <a href="#about" class="nav-link" aria-label="About">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    <span class="nav-label">About</span>
                </a>
                <a href="#skills" class="nav-link" aria-label="Skills">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    <span class="nav-label">Skills</span>
                </a>
                <a href="#projects" class="nav-link" aria-label="Projects">
                    <i data-lucide="rocket" class="w-4 h-4"></i>
                    <span class="nav-label">Projects</span>
                </a>
                <a href="#experience" class="nav-link" aria-label="Experience">
                    <i data-lucide="briefcase" class="w-4 h-4"></i>
                    <span class="nav-label">Experience</span>
                </a>
                <a href="#contact" class="nav-link" aria-label="Contact">
                    <i data-lucide="mail" class="w-4 h-4"></i>
                    <span class="nav-label">Contact</span>
                </a>
                <div class="w-[1px] h-5 bg-white/10 mx-1"></div>
                <a href="resume1.pdf" download class="nav-download" aria-label="Download Resume">
                    <i data-lucide="file-down" class="w-4 h-4"></i>
                    <span class="nav-label">Resume</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- ═══ Main Content — Sections loaded dynamically ═══ -->
    <main class="max-w-5xl mx-auto px-6 pt-10 pb-28">
        <div id="section-hero" class="section-loading"></div>
        <div id="section-about"></div>
        <div id="section-skills"></div>
        <div id="section-projects"></div>
        <div id="section-experience"></div>
        <div id="section-contact"></div>
    </main>

    <footer class="py-10 text-center border-t border-white/5">
        <p class="text-gray-500 text-sm">© 2026 Rajeev Kumar. Built with Passion & Caffeine.</p>
    </footer>

    <!-- Project Details Modal -->
    <div id="project-modal"
        class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-dark/95 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-500">
        <div
            class="relative w-full max-w-2xl glass-card rounded-3xl overflow-hidden shadow-2xl translate-y-8 transition-transform duration-500">
            <!-- Close Button -->
            <button id="modal-close"
                class="absolute top-4 right-4 z-20 p-2 bg-dark/50 text-white rounded-full border border-white/10 hover:bg-white/10 active:scale-95 transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <div class="relative aspect-video overflow-hidden">
                <img id="modal-image" src="" alt="Project Preview" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-card via-card/20 to-transparent"></div>
            </div>

            <div class="p-8 space-y-4">
                <h3 id="modal-title" class="text-2xl md:text-3xl font-bold text-white font-['Outfit']"></h3>
                <p id="modal-details" class="text-gray-400 leading-relaxed text-base"></p>

                <div class="flex gap-4 pt-6">
                    <a id="modal-github" href="#" target="_blank"
                        class="flex-1 flex items-center justify-center gap-2 px-6 py-3 bg-white/5 text-white font-bold rounded-2xl border border-white/10 hover:bg-white/10 transition-all">
                        <i class="fa-brands fa-github text-xl"></i>
                        GitHub
                    </a>
                    <a id="modal-live" href="#" target="_blank"
                        class="flex-1 flex items-center justify-center gap-2 px-6 py-3 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/20 hover:-translate-y-1 transition-all">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                        Live Preview
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
