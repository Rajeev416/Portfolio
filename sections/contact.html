<!-- Contact Section -->
<section id="contact" class="py-16">
    <div class="max-w-5xl mx-auto px-4">
        <div class="text-center space-y-3 mb-12 reveal reveal-left">
            <p class="text-accent-indigo font-medium tracking-wider text-xs uppercase opacity-80">Get In Touch
            </p>
            <h2 class="text-2xl md:text-3xl font-bold text-white font-['Outfit']">Let's Connect</h2>
            <p class="text-gray-400 text-sm max-w-md mx-auto">
                Open for collaborations or just a friendly chat about technology.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 reveal reveal-right items-start">
            <!-- Left Column: Contact Links -->
            <div
                class="lg:col-span-2 p-6 md:p-8 glass-card rounded-3xl space-y-8 group relative overflow-hidden">
                <div class="absolute -top-12 -left-12 w-24 h-24 bg-primary/10 rounded-full blur-3xl"></div>

                <div class="space-y-6 relative z-10">
                    <h3 class="text-lg font-bold text-white">Contact Info</h3>
                    <div class="space-y-5">
                        <a href="mailto:rajeevkumar98400@gmail.com" class="flex items-center gap-4 group/item">
                            <div
                                class="w-10 h-10 bg-accent-indigo/10 rounded-xl flex items-center justify-center text-accent-indigo transition-all group-hover/item:scale-110">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </div>
                            <div class="min-w-0">
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Email
                                </p>
                                <p class="text-gray-300 text-sm truncate">rajeevkumar98400@gmail.com</p>
                            </div>
                        </a>
                        <div class="flex items-center gap-4">
                            <div
                                class="w-10 h-10 bg-accent-indigo/10 rounded-xl flex items-center justify-center text-accent-indigo">
                                <i data-lucide="phone" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Phone
                                </p>
                                <p class="text-gray-300 text-sm">+91-9142779970</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div
                                class="w-10 h-10 bg-accent-indigo/10 rounded-xl flex items-center justify-center text-accent-indigo">
                                <i data-lucide="map-pin" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                                    Location</p>
                                <p class="text-gray-300 text-sm">Punjab, India</p>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-white/5 flex gap-3">
                        <a href="https://github.com/Rajeev416" target="_blank"
                            class="p-2.5 bg-white/5 border border-white/10 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all">
                            <i class="fa-brands fa-github text-lg"></i>
                        </a>
                        <a href="https://linkedin.com/in/rajeev-kumar2004" target="_blank"
                            class="p-2.5 bg-white/5 border border-white/10 rounded-xl text-gray-400 hover:text-[#0077B5] hover:bg-white/10 transition-all">
                            <i class="fa-brands fa-linkedin text-lg"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Right Column: Form -->
            <div
                class="lg:col-span-3 p-6 md:p-8 glass-card rounded-3xl group relative overflow-hidden">
                <form id="contact-form" name="contact" method="POST" data-netlify="true"
                    data-netlify-honeypot="bot-field"
                    class="space-y-4 relative z-10">
                    <!-- Netlify Form Name -->
                    <input type="hidden" name="form-name" value="contact">

                    <!-- Honeypot field for spam protection -->
                    <div class="hidden">
                        <label>Don't fill this out if you're human: <input name="bot-field" /></label>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label
                                class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Name</label>
                            <input type="text" name="name" placeholder="Enter Your Name" required
                                class="w-full px-4 py-3 bg-white/[0.03] border border-white/10 rounded-2xl text-white text-sm placeholder:text-gray-700 focus:outline-none focus:border-accent-indigo/50 focus:bg-white/[0.05] transition-all">
                        </div>
                        <div class="space-y-1.5">
                            <label
                                class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Email</label>
                            <input type="email" name="email" placeholder="Enter Your Email" required
                                class="w-full px-4 py-3 bg-white/[0.03] border border-white/10 rounded-2xl text-white text-sm placeholder:text-gray-700 focus:outline-none focus:border-accent-indigo/50 focus:bg-white/[0.05] transition-all">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label
                            class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Message</label>
                        <textarea name="message" rows="3" placeholder="Tell me about your project..." required
                            class="w-full px-4 py-3 bg-white/[0.03] border border-white/10 rounded-2xl text-white text-sm placeholder:text-gray-700 focus:outline-none focus:border-accent-indigo/50 focus:bg-white/[0.05] transition-all resize-none"></textarea>
                    </div>

                    <button type="submit"
                        class="w-full py-3.5 bg-accent-indigo text-white font-bold rounded-2xl text-sm shadow-lg shadow-accent-indigo/20 hover:shadow-accent-indigo/40 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group/btn">
                        <span>Send Message</span>
                        <i data-lucide="send"
                            class="w-3.5 h-3.5 group-hover/btn:translate-x-1 group-hover/btn:-translate-y-1 transition-transform"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
