<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Rajeev Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5CF6',
                        dark: '#0a0a0f',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark text-white font-['Outfit'] min-h-[100vh] min-h-[100dvh] flex items-center justify-center overflow-hidden">
    <div class="relative group">
        <!-- Glow effects -->
        <div class="absolute -inset-1 bg-gradient-to-r from-primary to-purple-600 rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
        
        <div class="relative px-8 py-12 bg-black/40 backdrop-blur-xl border border-white/10 rounded-3xl flex flex-col items-center space-y-6 max-w-sm text-center">
            <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center text-primary animate-bounce">
                <i data-lucide="check-circle-2" class="w-10 h-10"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-3xl font-bold tracking-tight">Message Received!</h1>
                <p class="text-gray-400 text-sm">Thank you for reaching out. I'll get back to you as soon as possible.</p>
            </div>
            <a href="index.html" class="px-8 py-3 bg-primary text-white font-bold rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-lg shadow-primary/20 flex items-center gap-2 group/btn">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover/btn:-translate-x-1 transition-transform"></i>
                Back to Portfolio
            </a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
